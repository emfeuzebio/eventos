<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 52" width="190" height="52">
  <!-- Fundo arredondado -->
  <rect width="190" height="52" rx="6" fill="#212631" />
  
  <!-- Ícone: calendário -->
  <rect x="6" y="10" width="28" height="32" rx="4" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="12" y1="10" x2="12" y2="5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="10" x2="28" y2="5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Dias do calendário -->
  <circle cx="14" cy="22" r="3.5" fill="#FFD700"/>
  <circle cx="26" cy="22" r="3.5" fill="#FFD700"/>
  <circle cx="14" cy="32" r="3.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="26" cy="32" r="3.5" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- Linha separadora -->
  <line x1="42" y1="8" x2="42" y2="44" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  
  <!-- Texto principal -->
  <text x="50" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" letter-spacing="0.2">Gestão de Eventos</text>
  
  <!-- Subtítulo com font-stretch: condensed (letras mais altas/estreitas) -->
  <text 
    x="50" y="34" 
    font-family="'Segoe UI', Arial, sans-serif" 
    font-size="8.5" 
    font-stretch="condensed"
    fill="#88B4D4" 
    letter-spacing="0.8"
  >Federação Espírita Brasileira</text>
</svg>